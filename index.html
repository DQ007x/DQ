<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋对战</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>DQ五子棋</h1>
        <div class="game-info">
            <div class="player-info">
                <div class="player current-player" id="player1">黑棋: <span id="black-score">0</span></div>
                <div class="player" id="player2">白棋: <span id="white-score">0</span></div>
            </div>
            <div class="timer" id="timer">99</div>
            <div class="status" id="status">等待玩家连接...</div>
        </div>
        <div class="board" id="board"></div>
        <div class="controls">
            <button id="copy-link">复制链接</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
